host: localhost:8080
info:
  contact: {}
  description: Cashback backend API
  title: Cashback API
  version: "1.0"
paths:
  /auth/{provider}:
    get:
      parameters:
      - description: OAuth provider (e.g. google)
        in: path
        name: provider
        required: true
        type: string
      responses:
        "307":
          description: Temporary Redirect
      summary: Initiate OAuth2 login
      tags:
      - auth
  /auth/{provider}/callback:
    get:
      parameters:
      - description: OAuth provider (e.g. google)
        in: path
        name: provider
        required: true
        type: string
      - description: Authorization code from provider
        in: query
        name: code
